<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Automated Translator System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌍 Automated Translator System</h1>

<p class="subtitle">Speak any language → Convert to selected language</p>

<select id="targetLang">
<option value="ta">Tamil</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
</select>

<br><br>

<button onclick="startRecording()">🎤 Start Recording</button>

<div class="box">
<h3>Recognized Speech</h3>
<p id="speechText">Speak something...</p>
</div>

<div class="box">
<h3>Translated Text</h3>
<p id="translatedText">Translation will appear here...</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
